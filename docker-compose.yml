# =============================================================================
# BoneGuard — Docker Compose
# Runs backend + frontend locally with one command: docker-compose up
# The Python AI server stays on HuggingFace (already deployed)
# =============================================================================

version: "3.9"

services:

  # ── Node.js Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boneguard-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - HF_API_URL=${HF_API_URL}
      - HF_TIMEOUT_MS=${HF_TIMEOUT_MS:-60000}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FRONTEND_URL=http://localhost:3000
      # Vector store is baked into the image via COPY
      - VECTORSTORE_PATH=/app/vectorstore.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boneguard-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: boneguard-network
